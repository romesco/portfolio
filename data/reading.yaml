# Reading: a curated blogroll shown at rosarioscalise.com/reading (a hidden
# page, not linked from the site). Group your links by topic; each entry is
# {name, url, note?}. The display domain is derived from the URL automatically.
# Inline Markdown works in `note`. Add/reorder freely.
#
# These are starter examples: edit or replace with the people/sites YOU read.
groups:
  - name: Robotics & ML
    links:
      - name: Matt Mason
        url: https://mtmason.com/matt-mason-robotics-blog/
        note: A manipulation pioneer (CMU) blogging "the funnest ideas in robotics."
      - name: Drew Bagnell
        url: https://robotwhisperer.org/classes/
        # A course page, not a blog: opt out of the river so no stray "latest".
        feed: false
        note: "Your favorite researcher's favorite researcher."
      - name: The Gradient
        url: https://thegradient.pub
        note: Long-form, accessible essays on machine-learning research.
      - name: Distill
        url: https://distill.pub
        note: "Interactive explainers for ML ideas: archived, still some of the clearest around."
      - name: John Langford
        url: https://hunch.net/
        note: "John Langford's long-running Machine Learning (Theory) blog, sharp on learning theory and practice."
      - name: Richard Sutton
        url: http://incompleteideas.net/
        # Old flat homepage, no feed: pin his most recent dated essay as the link.
        latest:
          title: The Bitter Lesson
          url: http://incompleteideas.net/IncIdeas/BitterLesson.html
          date: 2019-03-13
        note: "A reinforcement learning founder's site: his essays and the Sutton and Barto RL textbook."
      - name: Ben Recht
        url: https://www.argmin.net/
        note: "Ben Recht's sharp, skeptical essays on machine learning, optimization, and the scientific method."
      - name: Bandit Algorithms
        url: https://banditalgs.com/
        note: "Tor Lattimore and Csaba Szepesvári's book and notes on bandit problems."
      - name: Dimitri Bertsekas
        url: https://web.mit.edu/dimitrib/www/home.html
        latest:
          title: Reinforcement Learning and Optimal Control
          url: https://web.mit.edu/dimitrib/www/RLbook.html
          date: 2025
        note: "An optimization and dynamic programming authority (MIT), with a book bridging reinforcement learning and optimal control."

  - name: Friends & Adventures
    links:
      - name: Galen Weld
        url: https://galenweld.com/blog
        note: Backcountry skiing, mountaineering, and alpine trip reports, with gorgeous photography.
      - name: Maxwell Forbes
        url: https://maxwellforbes.com/studio/
        # No <link rel=alternate> feed on the site; his writing goes out via a
        # Buttondown newsletter, which exposes an RSS feed we point at directly.
        feed: https://buttondown.email/mbforbes/rss
        note: "AI researcher: travel photography, software experiments, and reflections."
      - name: Carolina Higuera
        url: https://carolinahiguera.github.io/
        note: "A UW robotics PhD and Meta visiting researcher, working on vision-based tactile perception for robot manipulation."
      - name: Adam Fishman
        url: https://fishbotics.com
        note: "A UW robotics PhD now at OpenAI, working on robot manipulation and learning, with biking, hiking, and pizza on the side."
      - name: Jonas Frey
        url: https://jonasfrey96.github.io/
        note: "A robotics postdoc at Stanford and Berkeley (ETH PhD), working on perception and navigation for legged robots."
      - name: Melanie Sclar
        url: https://msclar.github.io/
        note: "A UW CS PhD working on robust reasoning and theory of mind in language models."
      - name: Mohak Bhardwaj
        url: https://mohakbhardwaj.github.io/blog/
        note: "A UW robotics PhD blending model predictive control with reinforcement learning for robot manipulation and control."
      - name: Tim Dettmers
        url: https://timdettmers.com/
        # WordPress RSS at /feed/ (not always auto-discoverable), so point at it
        # directly, like the Maxwell Forbes entry.
        feed: https://timdettmers.com/feed/
        note: "A UW CS PhD (now at Ai2 / CMU) known for QLoRA and the bitsandbytes library, whose 'Which GPU to Get for Deep Learning' guide is a field rite of passage."
      - name: Gokul Swamy
        url: https://gokul.dev/blog/
        # His feed.xml only carries one self-hosted post (a 2017 piece); the
        # writing worth reading lives off-site (CMU ML blog, Notion), so RSS
        # shows a stale "latest." Scrape his hand-maintained index instead,
        # where posts list newest-first as <h4 class="project-title"><a>.
        crawl:
          title_class: project-title
        note: "A CMU PhD researcher in reinforcement and imitation learning, writing clear technical tutorials like his RLHF 101 series."
