# Microblog feed shown at rosarioscalise.com/twitter (a hidden page, not linked
# from the site). It looks like a Twitter/X timeline but in the site's style.
# Newest first (sorted by `at`). To post, add an entry:
#
#   - at: 2026-06-14 09:12:00      # date + time (the timeline shows "2h"/"3d"/date)
#     text: "Your short post. Inline [links](https://example.com) and *emphasis* work."
#
# To repost someone else's post (prototype: content stored here for now), add a
# `repost:` block. Include your own `text` for a quote-style comment, or omit it
# for a plain repost:
#
#   - at: 2026-06-12 16:20:00
#     text: "My take on this."            # optional (quote comment)
#     repost:
#       author: Octi Zhang
#       handle: zoctipus
#       url: https://zoctipus.github.io/  # link to their original
#       at: 2026-06-12 15:05:00           # their post's time
#       text: "Their post."
#       avatar: https://.../octi.jpg      # optional; falls back to initials
#
# To repost an Instagram post, give the `repost.url` an instagram.com link: it
# renders in the card style with just the post's photo (the embed is cropped to
# hide Instagram's own chrome). Set `aspect:` to the photo's width/height so the
# crop fits: 1 square (default), 0.8 portrait (4:5), 1.91 landscape. `author`,
# `handle`, and `text` fill the card's caption line.
#
# To repost a YouTube video, set `source: youtube`, point `url` at the channel
# (the card links back to it), `video` at the watch URL, and optionally `start:`
# seconds (the inline preview plays from there on hover). `text` is the title.
# Easiest: `python3 scripts/yt_repost.py <url> --start 4:20 --append`.
# Instagram has a matching helper: `python3 scripts/ig_repost.py <url> --append`.
# Full guide: docs/REPOSTING.md.
#
handle: rosarioscalise

posts:
  - at: 2026-06-14 09:12:00
    text: "the only way out of it is through it"

  - at: 2026-06-14 08:30:00
    text: "For a long time I didn't realize other people thought the same way as me and was kind of a bit discouraged about it, but it's nice to see there are others (even folks who are pretty well-respected and who \"figured out the game\") saying this kind of thing. Highly recommend watching it in its entirety! But if you want to focus on one part, listen to the section around timestamp 4:20"
    repost:
      source: youtube
      author: EO
      url: https://www.youtube.com/@eoglobal       # link back to the channel
      video: https://www.youtube.com/watch?v=xWYb7tImErI
      start: 260   # hover preview starts at 4:20
      text: "The Only Trait for Success in the AI Era—How to Build It | Carnegie Mellon University Po-Shen Loh"

  - at: 2026-06-13 18:30:00
    text: "Throwback to the DRC finals."
    repost:
      author: romesc
