# Microblog feed shown at rosarioscalise.com/twitter (a hidden page, not linked
# from the site). It looks like a Twitter/X timeline but in the site's style.
# Newest first (sorted by `at`). To post, add an entry:
#
#   - at: 2026-06-14 09:12:00      # date + time (the timeline shows "2h"/"3d"/date)
#     text: "Your short post. Inline [links](https://example.com) and *emphasis* work."
#
# To repost someone else's post (prototype: content stored here for now), add a
# `repost:` block. Include your own `text` for a quote-style comment, or omit it
# for a plain repost:
#
#   - at: 2026-06-12 16:20:00
#     text: "My take on this."            # optional (quote comment)
#     repost:
#       author: Octi Zhang
#       handle: zoctipus
#       url: https://zoctipus.github.io/  # link to their original
#       at: 2026-06-12 15:05:00           # their post's time
#       text: "Their post."
#       avatar: https://.../octi.jpg      # optional; falls back to initials
#
