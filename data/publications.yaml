# Publications. P/J/C/W series determined by `type`. Each series sorted
# by `year` descending; equal years preserve YAML order.
#
# Author list grammar:
#   - bare string                               → name as-is
#   - {name: ..., me: true}                     → wraps in \textbf{...} (the user)
#   - {name: ..., equal: true}                  → suffix `*` (co-first author)
#   - {name: ..., dagger: true}                 → suffix `†` (e.g. co-advisor)
#   - "..."  (quoted, list element)             → literal ellipsis for abbreviated lists
#   - "//"   (or "\\")                           → website only: force a line break in
#                                                  the author list here (CV ignores it)
#
# Links: any of arxiv, pdf, doi, ieee, github, project. arxiv: <id> expands
# to https://arxiv.org/abs/<id>; arxiv: <full URL> passes through.
#
# Website only: `featured: true` shows the entry on the homepage. `media:` may
# be a single video/image/youtube OR a LIST of them: a list renders as a
# carousel in the dropdown. Each item: {src, type?, poster?, autoplay?, alt?,
# label?}. `label` captions the slide in a carousel.
#
# `coverage:` is an optional list of real press/media hits: {outlet, url} (a
# bare string also works). Featured works render a quiet "press" line; ALL works
# with coverage are collected on the hidden /inthepress page. Only add genuine
# third-party coverage (not the project's own page). Each outlet shows its brand
# favicon (by domain) on /inthepress; add `favicon: <url>` to an item to override
# it when the auto-derived glyph is wrong (e.g. a subdomain with no real icon).
#
# An author entry may carry `affil: {name, url, domain?, favicon?}`: a small
# institution GLYPH (favicon only, no visible label; the name is the hover tooltip)
# rendered right after that author's name, then the comma. Deduped: shown once per
# institution even if several authors share it. The glyph is the institution's
# favicon (by `domain`, else the url host, else explicit `favicon:`); `url` points
# at its coverage of the work if any, else that author's page. For an abbreviated
# author list ("..."), add a name-less entry `- {affil: {...}}` to drop the glyph
# at the end (e.g. Open X-Embodiment → Google DeepMind).

