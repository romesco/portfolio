# Grants written and won. Shown in the "Grants Awarded" section of the /awards
# page and the "Grants" section of the CV. Single source of truth for both.
#
# Each entry:
#   title:  grant / proposal title            (required)
#   agency: funding agency or sponsor         (required)
#   amount: monetary total, as a display string, e.g. "$250,000". For a compute
#           allocation, give the literal award plus an estimated cash-equivalent,
#           e.g. "50,000 GPU-hours (est. $150,000)".
#   role:   optional, e.g. "PI" / "co-PI"     (carried; not shown yet)
#   year:   optional; carried but NOT displayed yet (years are off /awards for now)

- title: "NSF ACCESS Allocation"
  agency: National Science Foundation (NSF)
  # 50,000 GPU-hours valued at a cloud-equivalent ~$3.00/A100-GPU-hour on-demand.
  amount: "50,000 GPU-hours (est. $150,000)"
