bio: >
  Rosario is a PhD student at the University of Washington in
  Machine Learning & Robotics. His research applies machine learning
  and optimization to continual learning, reinforcement learning,
  large-scale physics-based simulation, and the science of
  transferring learned behaviors to physical systems.
