# Used for <title> and meta description. Keep it short.
description: Personal site of Rosario Scalise, PhD student at the University of Washington.

# Homepage banner rendered as raw HTML between the masthead and News.
# Keep the markup here so it is easy to edit if the copy changes.
banner_html: >-
  As Will Hunting would say: <strong><span style="color: red;">I'm on the job maahkit! Send me a lettah!</span></strong>
# Favicon pool: a random one is rendered as an inline SVG emoji on every
# page load (see the head script in _layout.html.j2). Add/remove freely;
# emoji that stay legible at ~16px work best.
favicons: ["🤖", "🦾", "🧪", "🧬", "⚙️", "🛰️", "🔬", "🔭", "⚛️", "✨"]

# Umami analytics (cookieless, privacy-friendly). The tracking snippet in
# _layout.html.j2 renders ONLY when both fields below are set, so the site stays
# clean until activated. Outbound link clicks are tracked automatically via a
# small shim in the layout.
#
# Currently using the Umami Cloud free Hobby tier. `umami_src` below is the
# standard Umami Cloud (US) tracker; if cloud.umami.is shows a different host
# (e.g. eu.umami.is), swap it. Set `umami_id` to this site's Website ID to go
# live. To move to a self-hosted instance later, just change these two fields
# (see handoffs/20260617_UMAMI_SELFHOST.md).
analytics:
  umami_src: "https://cloud.umami.is/script.js"
  umami_id: "b3fad5ea-4eb5-42ed-9bfa-95bf0bdfcc76"    # cloud.umami.is Website ID for rosarioscalise.com
